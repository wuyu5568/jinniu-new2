# Reference copy of /etc/nginx/sites-available/jinniu (HTTPS as managed by Certbot).
# Deploy: copy protect zones to conf.d, then merge directives into the live site file.

server {
    server_name go.wulid.com www.go.wulid.com;
    root /var/www/jinniu/html;
    index index.html;

    server_tokens off;
    client_max_body_size 20m;
    client_body_timeout 10s;
    client_header_timeout 10s;

    limit_req_status 429;
    limit_conn_status 429;
    limit_conn jinniu_conn 50;
    limit_req zone=jinniu_web burst=50 nodelay;

    if ($jinniu_method_ok = 0) {
        return 405;
    }

    location /api/ {
        limit_req zone=jinniu_api burst=20 nodelay;
        limit_conn jinniu_conn 20;

        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 360s;
        proxy_send_timeout 360s;
    }

    location = /health {
        # monitor probe — no API rate zone
        proxy_pass http://127.0.0.1:8000/health;
    }

    location /admin {
        try_files $uri $uri/ /admin/index.html;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/go.wulid.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/go.wulid.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = go.wulid.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name go.wulid.com www.go.wulid.com;
    return 404; # managed by Certbot
}
