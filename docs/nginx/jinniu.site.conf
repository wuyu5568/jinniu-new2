# Reference copy of /etc/nginx/sites-available/jinniu (HTTPS as managed by Certbot).
# Deploy: copy protect zones to conf.d, then merge directives into the live site file.
#
# Cache policy:
# - HTML / SPA entry: no-cache (deploy 后立刻看到新入口)
# - 带 hash 的静态资源: 长缓存
# - /api/: 不缓存（鉴权接口）

server {
    server_name jinniuxieyi.com www.jinniuxieyi.com;
    root /var/www/jinniu/html;
    index index.html;

    server_tokens off;
    client_max_body_size 20m;
    client_body_timeout 10s;
    client_header_timeout 10s;

    limit_req_status 429;
    limit_conn_status 429;
    limit_conn jinniu_conn 50;
    limit_req zone=jinniu_web burst=50 nodelay;

    if ($jinniu_method_ok = 0) {
        return 405;
    }

    location /api/ {
        limit_req zone=jinniu_api burst=20 nodelay;
        limit_conn jinniu_conn 20;

        # 鉴权 API 不做 proxy_cache
        add_header Cache-Control "no-store" always;

        proxy_pass http://127.0.0.1:8000/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 360s;
        proxy_send_timeout 360s;
    }

    location = /health {
        # monitor probe — no API rate zone
        add_header Cache-Control "no-store" always;
        proxy_pass http://127.0.0.1:8000/health;
    }

    # 带内容 hash 的静态资源（taurus /static、admin /admin/js|css）
    location ~* ^/(static|admin/(js|css|tinymce|loading))/ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
        try_files $uri =404;
    }

    # 其它静态扩展名（favicon、图片等）
    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|webp|woff2?|ttf|map)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
        access_log off;
        try_files $uri =404;
    }

    # SPA 入口 HTML：禁止缓存，保证发版后立刻换新 JS 引用
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location = /admin/index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    location /admin {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /admin/index.html;
    }

    location / {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri $uri/ /index.html;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/jinniuxieyi.com/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/jinniuxieyi.com/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot


}


server {
    if ($host = www.jinniuxieyi.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    if ($host = jinniuxieyi.com) {
        return 301 https://$host$request_uri;
    } # managed by Certbot


    server_name jinniuxieyi.com www.jinniuxieyi.com;

    listen 80;
    return 404; # managed by Certbot




}