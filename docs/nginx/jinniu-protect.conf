# Jinniu (go.wulid.com) rate / connection zones — include from http via conf.d
# Token-bucket style: rate = refill, burst = bucket depth

limit_req_zone $binary_remote_addr zone=jinniu_api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=jinniu_web:10m rate=30r/s;
limit_conn_zone $binary_remote_addr zone=jinniu_conn:10m;

map $request_method $jinniu_method_ok {
    GET     1;
    POST    1;
    HEAD    1;
    OPTIONS 1;
    default 0;
}
